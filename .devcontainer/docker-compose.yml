# Devcontainer overlay: mount source code for live editing.
# Merged on top of the root docker-compose.yml by Codespaces / VS Code.
services:
  odysseus:
    volumes:
      - ..:/app:cached
    environment:
      - APP_PORT=7000
      - SEARXNG_HOST_PORT=8080
      - CHROMADB_HOST_PORT=8100
      - NTFY_HOST_PORT=8091
    command: ["python", "-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "7000", "--reload"]
